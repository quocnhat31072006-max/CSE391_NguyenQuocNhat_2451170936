<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="boxmodel_lab.css" />
    <title>Box Model Lab</title>
  </head>
  <body>

    <!-- PHẦN 1 -->
    <h2>Phần 1: Content-box vs Border-box</h2>
    <div class="container">
      <div class="box box1">Content-box</div>
      <div class="box box2">Border-box</div>
    </div>

    <!-- PHẦN 2 -->
    <h2>Phần 2: Layout 3 cột</h2>

    <h3>Không dùng border-box</h3>
    <div class="layout no-box">
      <div class="sidebar">Sidebar</div>
      <div class="content">Content</div>
      <div class="ads">Ads</div>
    </div>

    <h3>Dùng border-box</h3>
    <div class="layout with-box">
      <div class="sidebar">Sidebar</div>
      <div class="content">Content</div>
      <div class="ads">Ads</div>
    </div>

  </body>
</html>
