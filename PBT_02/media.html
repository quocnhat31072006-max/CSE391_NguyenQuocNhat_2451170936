<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Multimedia</title>
</head>
<body>

    <header>
        <h1>Giới thiệu sản phẩm</h1>
    </header>

    <main>

        <!-- SVG logo -->
        <svg width="60" height="60" aria-label="Logo Shop">
            <circle cx="30" cy="30" r="25" fill="#4CAF50"></circle>
            <text x="50%" y="55%" text-anchor="middle" fill="white">S</text>
        </svg>

        <!-- Ảnh sản phẩm -->
        <section>
            <h2>Hình ảnh sản phẩm</h2>

            <figure>
                <img 
                    src="https://placehold.co/300x200" 
                    alt="iPhone 16 Pro Max mặt trước"
                    loading="lazy"
                    style="max-width:100%; height:auto;"
                >
                <figcaption>Mặt trước iPhone 16 Pro Max</figcaption>
            </figure>

            <figure>
                <img 
                    src="https://placehold.co/300x200" 
                    alt="iPhone 16 Pro Max mặt sau"
                    loading="lazy"
                    style="max-width:100%; height:auto;"
                >
                <figcaption>Mặt sau iPhone 16 Pro Max</figcaption>
            </figure>

            <figure>
                <img 
                    src="https://placehold.co/300x200" 
                    alt="iPhone 16 Pro Max góc nghiêng"
                    loading="lazy"
                    style="max-width:100%; height:auto;"
                >
                <figcaption>Góc nghiêng sản phẩm</figcaption>
            </figure>
        </section>

        <section>
            <h2>Video giới thiệu (YouTube)</h2>
            <iframe 
                width="560" 
                height="315" 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                title="Video sản phẩm"
                allowfullscreen>
            </iframe>
        </section>

        <section>
            <h2>Video demo sản phẩm</h2>
            <video controls poster="https://placehold.co/300x200">
                <source src="video.mp4" type="video/mp4">
                <source src="video.webm" type="video/webm">
                Trình duyệt không hỗ trợ video.
            </video>
        </section>

        <section>
            <h2>Nhạc nền giới thiệu</h2>
            <audio controls>
                <source src="audio.mp3" type="audio/mpeg">
                Trình duyệt không hỗ trợ audio.
            </audio>
        </section>

    </main>

</body>
</html>
